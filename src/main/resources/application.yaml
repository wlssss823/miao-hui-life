server:
  port: 8081
spring:
  application:
    name: dianping-plus
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dianpingplus_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root123
  redis:
    host: localhost
    port: 6379
#    password: 123321
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
    database: 1
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
  rabbitmq:
    addresses: localhost:5672
    username: admin
    password: 123456
    virtual-host: /dev
    listener:
      simple:
        acknowledge-mode: manual
    publisher-returns: true
    publisher-confirm-type: correlated
mybatis-plus:
  type-aliases-package: com.dianpingplus.entity # 别名扫描包
logging:
  level:
    com.dianpingplus: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %clr([%X{traceId}]){faint} [%thread] %-5level %logger{36} - %msg%n"